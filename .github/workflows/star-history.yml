name: Star History

# Regenerates the README star history chart in CI. Needed since GitHub's
# 2026-06-30 stargazers API restriction broke the hosted star-history.com
# embed; this runs with the repo's own token, which can still read stars.
# No `watch` trigger: a star-triggered run is attributed to the stargazer,
# so when the run fails (e.g. expired STAR_HISTORY_TOKEN) GitHub emails the
# failure to that third party (#265). The daily schedule keeps the chart
# fresh enough.
on:
  schedule:
    - cron: '17 4 * * *' # daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: narayann7/star-history-action@29310fc87122228fe128d811f14027be3ca99601 # v1.0.3
        with:
          # Since ~2026-07-15 GitHub also blocks the Actions installation
          # token from the stargazers endpoint; only an admin/collaborator
          # user token works. Fine-grained PAT, Metadata: Read-only.
          token: ${{ secrets.STAR_HISTORY_TOKEN || github.token }}
